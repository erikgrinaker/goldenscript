name: CI
on: [push, pull_request, workflow_dispatch]
permissions:
  contents: read

jobs:
  # Run tests and clippy/rustfmt checks.
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@1.97.1
      id: toolchain
      with:
        components: clippy, rustfmt
    - uses: actions/cache@v6
      with:
        path: target
        key: ${{runner.os}}-target-${{steps.toolchain.outputs.cachekey}}-${{hashFiles('Cargo.toml', 'Cargo.lock')}}
    - run: cargo build --tests
    - run: cargo test
    - run: cargo clippy --tests --no-deps -- -D warnings
    - run: cargo fmt --check

  # Verify the MSRV and that minimal dependency versions pass tests.
  versions:
    name: Minimal Dependency Versions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@nightly
      id: toolchain
    - uses: actions/cache@v6
      with:
        path: target
        key: ${{runner.os}}-target-${{steps.toolchain.outputs.cachekey}}-${{hashFiles('Cargo.toml', 'Cargo.lock')}}
    - uses: taiki-e/install-action@v2
      with:
        tool: cargo-hack,cargo-minimal-versions
    - run: cargo hack check --rust-version --workspace --all-targets --ignore-private
    - run: cargo minimal-versions check --direct
    - run: cargo minimal-versions build --tests --direct
    - run: cargo minimal-versions test --direct
